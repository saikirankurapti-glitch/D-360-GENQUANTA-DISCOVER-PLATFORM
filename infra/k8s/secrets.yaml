# =============================================================================
# AnalytiX Discover – Kubernetes Secrets
# Phase 8: Unified PostgreSQL credentials for all services.
# IMPORTANT: In production, populate these via:
#   kubectl create secret generic genquantaa-secrets \
#     --from-literal=auth-secret-key=$(openssl rand -hex 32) \
#     --from-literal=connector-encryption-key=$(openssl rand -hex 32) \
#     ...
#   OR use HashiCorp Vault / GCP Secret Manager / AWS Secrets Manager.
#
# The values below are base64-encoded PLACEHOLDERS. Replace before deployment.
# To encode: echo -n "your-secret" | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: genquantaa-secrets
  namespace: genquantaa
  labels:
    app.kubernetes.io/part-of: genquantaa-discover
type: Opaque
data:
  # Auth Service
  auth-secret-key: U1VQRVJTRUNSRVQ=          # REPLACE: openssl rand -hex 32
  auth-audit-secret: QVVESVRTRUNSRVQ=         # REPLACE: openssl rand -hex 32

  # Connector Service (Fernet encryption key – must be 32 url-safe base64 bytes)
  connector-encryption-key: Q09OTkVDVE9SVEVTVF9LRVk=  # REPLACE

  # Audit Service
  audit-api-secret: QVVESVRTRUNSRVQ=           # REPLACE

  # Unified PostgreSQL password (Phase 8)
  postgres-password: cG9zdGdyZXNwYXNz          # REPLACE: strong password

  # Grafana
  grafana-admin-password: R2VuUXVhbnRhYTIwMjYh  # REPLACE

  # External API keys (optional)
  openai-api-key: b3BlbmFpLXBsYWNlaG9sZGVy      # REPLACE if using OpenAI

  # SMTP (AlertManager)
  smtp-password: c210cC1wbGFjZWhvbGRlcg==       # REPLACE

---
apiVersion: v1
kind: Secret
metadata:
  name: genquantaa-db-credentials
  namespace: genquantaa
  labels:
    app.kubernetes.io/part-of: genquantaa-discover
type: Opaque
data:
  postgres-user: cG9zdGdyZXM=         # postgres
  postgres-password: cG9zdGdyZXM=     # REPLACE with strong password
