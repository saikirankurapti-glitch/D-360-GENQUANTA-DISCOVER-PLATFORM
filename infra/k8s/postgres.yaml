# =============================================================================
# AnalytiX Discover – PostgreSQL StatefulSet for Kubernetes
# Phase 8: Unified PostgreSQL instance for all platform services.
# =============================================================================

# --- StatefulSet ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: genquantaa
  labels:
    app: postgres
    tier: database
    app.kubernetes.io/part-of: genquantaa-discover
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: genquantaa-db-credentials
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: genquantaa-db-credentials
                  key: postgres-password
            - name: POSTGRES_DB
              value: "postgres"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

---
# --- Service ---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: genquantaa
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP

---
# --- Init Scripts ConfigMap ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: genquantaa
data:
  01_init_databases.sql: |
    CREATE DATABASE genquantaa_auth;
    CREATE DATABASE genquantaa_metadata;
    CREATE DATABASE genquantaa_query;
    CREATE DATABASE genquantaa_connector;
    CREATE DATABASE genquantaa_audit;
    CREATE DATABASE genquantaa_lineage;
    CREATE DATABASE genquantaa_bioinfo;
    CREATE DATABASE genquantaa_workflow;
    CREATE DATABASE genquantaa_ai;
    GRANT ALL PRIVILEGES ON DATABASE genquantaa_auth TO postgres;
    GRANT ALL PRIVILEGES ON DATABASE genquantaa_metadata TO postgres;
    GRANT ALL PRIVILEGES ON DATABASE genquantaa_query TO postgres;
    GRANT ALL PRIVILEGES ON DATABASE genquantaa_connector TO postgres;
    GRANT ALL PRIVILEGES ON DATABASE genquantaa_audit TO postgres;
    GRANT ALL PRIVILEGES ON DATABASE genquantaa_lineage TO postgres;
    GRANT ALL PRIVILEGES ON DATABASE genquantaa_bioinfo TO postgres;
    GRANT ALL PRIVILEGES ON DATABASE genquantaa_workflow TO postgres;
    GRANT ALL PRIVILEGES ON DATABASE genquantaa_ai TO postgres;

---
# --- PodDisruptionBudget ---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: genquantaa
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres
