# =============================================================================
# GENQUANTAA Discover – Auth Service Kubernetes Manifests
# Deployment · Service · HPA · PodDisruptionBudget
# =============================================================================

# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: genquantaa
  labels:
    app: auth-service
    app.kubernetes.io/part-of: genquantaa-discover
    app.kubernetes.io/version: "1.0.0"
    tier: security
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime rolling update
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: auth-service
          image: discover-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "8001"
            - name: DATABASE_URL
              value: "sqlite:///./auth.db"   # Upgrade to PostgreSQL for prod HA
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: genquantaa-secrets
                  key: auth-secret-key
            - name: AUDIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: genquantaa-secrets
                  key: auth-audit-secret
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: genquantaa-config
                  key: ENVIRONMENT
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: genquantaa-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: 8001
            failureThreshold: 30
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [auth-service]
                topologyKey: kubernetes.io/hostname

---
# --- Service ---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: genquantaa
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      protocol: TCP
      port: 8001
      targetPort: 8001
  type: ClusterIP

---
# --- Horizontal Pod Autoscaler ---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: genquantaa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

---
# --- Pod Disruption Budget ---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: genquantaa
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service
