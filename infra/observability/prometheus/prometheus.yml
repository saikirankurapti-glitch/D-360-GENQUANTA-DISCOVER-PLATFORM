# =============================================================================
# Prometheus Configuration – GENQUANTAA DISCOVER
# Scrapes all 10 microservices + infrastructure exporters
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'genquantaa-production'
    environment: 'production'

# Load alert rules
rule_files:
  - "alerts.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# =============================================================================
# SCRAPE CONFIGS – One job per microservice
# =============================================================================
scrape_configs:

  # OpenTelemetry Collector (aggregated metrics from all services)
  - job_name: 'otel-collector'
    scrape_interval: 15s
    static_configs:
      - targets: ['otel-collector:8889']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # --- Application Services ---
  - job_name: 'auth-service'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8001']
    labels:
      service: auth
      tier: security

  - job_name: 'metadata-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8002']
    labels:
      service: metadata
      tier: data

  - job_name: 'query-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8003']
    labels:
      service: query
      tier: data

  - job_name: 'cheminformatics-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8004']
    labels:
      service: cheminformatics
      tier: science

  - job_name: 'connector-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8005']
    labels:
      service: connector
      tier: integration

  - job_name: 'audit-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8006']
    labels:
      service: audit
      tier: compliance

  - job_name: 'lineage-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8007']
    labels:
      service: lineage
      tier: governance

  - job_name: 'bioinformatics-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8008']
    labels:
      service: bioinformatics
      tier: science

  - job_name: 'workflow-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8009']
    labels:
      service: workflow
      tier: automation

  - job_name: 'ai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8010']
    labels:
      service: ai
      tier: intelligence

  # --- Infrastructure ---
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'postgres-rdkit'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:9187']  # postgres_exporter
