# =============================================================================
# Prometheus Alert Rules – GENQUANTAA DISCOVER
# =============================================================================
groups:

  # ---------------------------------------------------------------------------
  # Service Availability
  # ---------------------------------------------------------------------------
  - name: service_availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "{{ $labels.instance }} has been unreachable for > 1 minute."

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) /
          rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

  # ---------------------------------------------------------------------------
  # Latency
  # ---------------------------------------------------------------------------
  - name: latency
    rules:
      - alert: HighAPILatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "p95 latency is {{ $value }}s (threshold: 2s)."

      - alert: CriticalAPILatency
        expr: |
          histogram_quantile(0.99,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 5.0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL latency on {{ $labels.job }}"
          description: "p99 latency is {{ $value }}s (threshold: 5s)."

      - alert: AIServiceHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="ai-service"}[5m])
          ) > 10.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI Service slow response"
          description: "AI Copilot p95 latency is {{ $value }}s."

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  - name: database
    rules:
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL (RDKit) is DOWN"
          description: "The cheminformatics database is unreachable."

      - alert: HighDBConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High DB connection count"
          description: "{{ $value }} active connections (threshold: 80)."

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  - name: infrastructure
    rules:
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}%."

      - alert: HighMemoryUsage
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "HIGH MEMORY on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}%."

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} /
           node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Only {{ $value }}% disk space remaining."

  # ---------------------------------------------------------------------------
  # Workflow & AI
  # ---------------------------------------------------------------------------
  - name: workflow_ai
    rules:
      - alert: WorkflowFailureRate
        expr: |
          rate(workflow_executions_total{status="failed"}[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Workflow failure rate elevated"
          description: "{{ $value }} workflow failures/sec."

      - alert: AITokenBudgetExceeded
        expr: ai_tokens_used_total > 900000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "AI token budget 90% consumed"
          description: "{{ $value }} tokens used this billing period."
